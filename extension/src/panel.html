<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareNote AI</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="appbar-title">CareNote AI</div>
      <button id="open-options" class="link-btn" type="button">設定</button>
    </header>

    <main class="content">
      <!-- 入力（生成） -->
      <section class="card" id="input-card">
        <label class="field-label" for="doctype">帳票の種類</label>
        <select id="doctype" class="select">
          <option value="assessment">アセスメント（課題分析）</option>
          <option value="carePlan">ケアプラン第1・2表</option>
          <option value="monitoring">モニタリング</option>
          <option value="meetingSummary">第4表 担当者会議の要点</option>
          <option value="supportLog">第5表 支援経過</option>
        </select>

        <div id="input-fields"></div>

        <div class="row">
          <button id="generate" class="btn btn-primary" type="button">下書きを生成</button>
        </div>

        <details id="paste-details" class="paste">
          <summary>下書きJSONを貼り付けて読み込む</summary>
          <p class="hint">
            Web版「作成」ページで生成した下書きのJSONを貼り付けても読み込めます（API設定が未済でも利用可）。
          </p>
          <textarea id="paste-json" class="textarea" rows="4" placeholder="{ ... }"></textarea>
          <button id="load-json" class="btn" type="button">読み込む</button>
        </details>

        <p id="input-message" class="message" role="status"></p>
      </section>

      <!-- 流し込み -->
      <section class="card inject-card" id="inject-card" hidden>
        <div class="inject-head">
          <span class="inject-title">カイポケへ流し込み</span>
          <span id="tab-status" class="badge">確認中…</span>
        </div>
        <p class="hint">
          開いているカイポケの編集画面の該当欄に下書きを入力します。<strong>保存は必ずご自身で確認のうえ</strong>行ってください。
        </p>
        <button id="inject" class="btn btn-accent" type="button" disabled>この画面に流し込む</button>
        <div id="inject-report" class="report"></div>
      </section>

      <!-- 結果 -->
      <section id="result" class="result" hidden>
        <div class="result-head">
          <span id="client-name" class="client-name"></span>
          <button id="copy-all" class="link-btn" type="button">全文コピー</button>
        </div>
        <div id="sections"></div>
        <div id="confirm-block"></div>
        <div class="row result-footer">
          <button id="clear" class="link-btn danger" type="button">下書きを消去</button>
        </div>
      </section>
    </main>

    <script src="panel.js"></script>
  </body>
</html>
