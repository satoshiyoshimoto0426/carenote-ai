<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareNote AI 設定</title>
    <link rel="stylesheet" href="panel.css" />
    <style>
      body {
        max-width: 560px;
        margin: 0 auto;
      }
      .content {
        padding: 24px 16px;
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <div class="appbar-title">CareNote AI 設定</div>
    </header>
    <main class="content">
      <section class="card">
        <label class="field-label" for="baseUrl">API のベースURL</label>
        <input
          id="baseUrl"
          class="input"
          type="url"
          placeholder="https://carenote-ai.example.com"
          autocomplete="off"
        />
        <p class="hint">CareNote AI を公開しているURL（末尾の / は不要）。例: Vercel の本番URL。</p>

        <label class="field-label" for="token">拡張トークン</label>
        <input id="token" class="input" type="password" autocomplete="off" />
        <p class="hint">
          サーバの環境変数 <code>CARENOTE_EXTENSION_TOKEN</code> と同じ値を設定します。
          このトークンはこの端末のローカル（chrome.storage.local）にのみ保存され、生成API以外には送信しません。
        </p>

        <div class="row">
          <button id="save" class="btn btn-primary" type="button">保存</button>
          <button id="test" class="btn" type="button">接続テスト</button>
        </div>
        <p id="message" class="message" role="status"></p>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
</html>
