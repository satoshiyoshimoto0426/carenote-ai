# =============================================================================
# Claude AI Triage & Review ── cortex-lite Phase 4 (Alert-Fix) 共通テンプレ
# =============================================================================
# 目的:
#   ① Issue に @claude と書かれたら / alert-fix ラベルが付いたら、AI が調査
#   ② PR が立ったら自動で AI レビュー → 指摘 → 緑になるまで反復
#
# 前提:
#   - リポジトリ Secrets に `ANTHROPIC_API_KEY` が設定済みであること
#   - id-token: write 権限が必須（OIDC 利用）
#   - 補助として github_token も明示的に渡す
# =============================================================================

name: Claude AI Triage & Review

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # =================================================================
  # 🚨 Issue Triage: alert-fix ラベル付き or @claude 呼び出し
  # =================================================================
  triage-issue:
    if: >
      (github.event_name == 'issues' && (
        (github.event.action == 'labeled' && github.event.label.name == 'alert-fix') ||
        contains(github.event.issue.body, '@claude')
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude AI Triage
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            あなたは cortex-lite ハーネスの「Alert-Fix エージェント」です。
            次の Issue を調査し、根本原因の仮説と修正案をコメントしてください。

            指示:
            - 「症状」「再現手順」「ログ」「環境」を読み解く
            - リポジトリのコードを Grep / Read で参照し、関連箇所を特定する
            - 根本原因の仮説を3つまで提示する（確度の高い順）
            - 最有力仮説への対策を、具体的なファイルパス・関数名つきで提示
            - もし簡単な修正なら、提案として diff を示す
            - 重大度（Critical / High / Medium / Low）を再評価する

            出力フォーマット:
            ```
            ## 🤖 AI トリアージ結果

            ### 根本原因の仮説（確度順）
            1. ... [確度: 高]
            2. ...
            3. ...

            ### 推奨対策
            - ファイル: `path/to/file.cs:42`
            - 修正概要: ...
            - リスク: ...

            ### 再評価された重大度
            🟠 High → 🟡 Medium（理由: ...）
            ```

  # =================================================================
  # 🔍 PR Auto Review
  # =================================================================
  review-pr:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude PR Auto Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            あなたは cortex-lite ハーネスの「Auto Reviewer」です。
            この PR の差分を、以下4カテゴリで評価してください：

            **[Graph] Critical** ── コードと依存関係（DB / API / UI）の整合性
            **[Impact] Critical** ── 本番で失敗するリスク（例: 既存テーブルにないカラム参照）
            **[Doc] Critical** ── コード変更に対応する CLAUDE.md / docs / コメントの追従
            **[Security] Minor** ── 認証情報の漏洩、SQL インジェクション、XSS 等

            判定基準:
            - Critical が1つでもあれば: REQUEST_CHANGES
            - Minor のみ: COMMENT
            - 問題なし: APPROVE

            CLAUDE.md（ユーザー層・プロジェクト層）の不変律違反は必ず指摘。
            指摘は必ず「該当ファイル:行番号」「現在のコード」「推奨修正」を示す。
